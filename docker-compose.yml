services:
  db:
    image: postgres:16-alpine
    container_name: rsud-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rsud
      POSTGRES_PASSWORD: rsud_secret
      POSTGRES_DB: rsud
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsud"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rsud-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql+asyncpg://rsud:rsud_secret@db:5432/rsud
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:80"

  frontend:
    build:
      context: ./web-admin
      dockerfile: Dockerfile
    container_name: rsud-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
  uploads:
